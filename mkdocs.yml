site_name: DevOps Basics
site_url: https://devops-basics.thedevopshub.org
site_description: Practical and document place for DevOps toolchain — 40+ topics with docs, hands-on scripts, and advanced examples
site_author: Tung Leo
repo_url: https://github.com/tungbq/devops-basics
repo_name: tungbq/devops-basics
edit_uri: edit/main/

docs_dir: .
site_dir: site
exclude_docs: |
  site/
  .git/
  node_modules/
  *.sh
  *.tf
  *.hcl
  *.yml.bak

theme:
  name: material
  custom_dir: overrides
  logo: https://upload.wikimedia.org/wikipedia/commons/0/05/Devops-toolchain.svg
  favicon: https://upload.wikimedia.org/wikipedia/commons/0/05/Devops-toolchain.svg
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang: en

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tungbq/devops-basics
    - icon: fontawesome/brands/github
      link: https://github.com/TheDevOpsHub

